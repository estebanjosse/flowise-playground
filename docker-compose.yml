services:
  flowise:
    image: flowiseai/flowise:3.1.1
    container_name: flowise
    restart: unless-stopped
    profiles:
      - flowise
    ports:
      - "${FLOWISE_PORT:-3000}:3000"
    environment:
      - DATABASE_PATH=/root/.flowise/flowise.db
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - NODE_TLS_REJECT_UNAUTHORIZED=0
      - SHOW_COMMUNITY_NODES=true
      - HTTP_SECURITY_CHECK=false
    volumes:
      - flowise_data:/root/.flowise
    networks:
      - flowise-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Optional: Qdrant vector database for RAG workflows
  qdrant:
    image: qdrant/qdrant:v1.16.2
    container_name: qdrant
    restart: unless-stopped
    profiles:
      - qdrant
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - flowise-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:6333/readyz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  ollama:
    image: ollama/ollama:0.13.3
    container_name: ollama
    restart: unless-stopped
    profiles:
      - ollama
    networks:
      - flowise-network
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
      - ./scripts/ollama-entrypoint.sh:/usr/local/bin/ollama-entrypoint.sh:ro
    environment:
      - OLLAMA_AUTO_PULL_MODELS=${OLLAMA_AUTO_PULL_MODELS:-qwen2.5:0.5b}
    entrypoint:
      - /bin/sh
      - /usr/local/bin/ollama-entrypoint.sh
    healthcheck:
      test: ["CMD", "/bin/ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  mcp-server:
    image: ghcr.io/estebanjosse/mcp-server-template:latest
    container_name: mcp-server
    profiles:
      - mcp-server
    networks:
      - flowise-network
    ports:
      - "5000:5000"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      MCP_METRICS_ENABLED: "true"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  phoenix:
    image: arizephoenix/phoenix:13.20.0 
    restart: unless-stopped
    profiles:
      - phoenix
    networks:
      - flowise-network
    ports:
      - 6006:6006  # PHOENIX_PORT
      - 4317:4317  # PHOENIX_GRPC_PORT
      - 9090:9090  # [Optional] PROMETHEUS PORT IF ENABLED
    environment:
      - PHOENIX_WORKING_DIR=/mnt/data
    volumes:
      - phoenix_data:/mnt/data   # PHOENIX_WORKING_DIR

volumes:
  flowise_data:
    driver: local
  qdrant_data:
    driver: local
  ollama-data:
    driver: local
  phoenix_data:
    driver: local

networks:
  flowise-network:
    driver: bridge
